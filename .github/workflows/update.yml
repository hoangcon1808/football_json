name: Update Football

on:
  repository_dispatch:
    types: [trigger-football-crawl]
  workflow_dispatch:
  # Tùy chọn: Tự động chạy dự phòng mỗi 3 tiếng một lần
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

# Nâng cao: Tự động hủy luồng đang chạy dở nếu có tín hiệu mới gửi tới, tránh sung đột Git
concurrency:
  group: update-football-group
  cancel-in-progress: true

jobs:
  update-streams:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 4. Run Python script
        run: python crawl.py

      - name: 5. Commit and Push changes
        env:
          # Cài đặt múi giờ Việt Nam cho log commit
          TZ: 'Asia/Ho_Chi_Minh'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add tv.m3u full.m3u channels.json
          
          # Kiểm tra nếu thực sự có thay đổi mới thực hiện commit và push
          if ! git diff --cached --quiet; then
            git commit -m "⚡ Auto update streams - $(date '+%d/%m/%Y %H:%M:%S')"
            git push
            echo "✅ Files updated and pushed successfully!"
          else
            echo "ℹ️ No changes to commit."
          fi
