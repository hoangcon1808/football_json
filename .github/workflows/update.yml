name: Auto Update IPTV Streams

on:
  # Cho phép chạy bằng tay trên giao diện GitHub
  workflow_dispatch:
  # Cho phép kích hoạt qua Webhook từ cron-job.org
  repository_dispatch:
    types: [update-streams]
  # (Tùy chọn) Chạy tự động mỗi 3 tiếng bằng cron nội bộ của GitHub để dự phòng
  schedule:
    - cron: '0 */3 * * *'

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Run stream scraper
        run: python main.py

      - name: 5. Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add channels.json full.m3u tv.m3u
          
          # Kiểm tra nếu có thay đổi mới commit, tránh lỗi workflow khi file không đổi
          if [-n "$(git status --porcelain)"]; then
            git commit -m "⚡ Auto-update streams: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            print "No changes to commit ✔"
          fi
